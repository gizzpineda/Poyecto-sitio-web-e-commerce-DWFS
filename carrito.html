<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Carrito - CELLPOINT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="./agregarCarrito.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-space { font-family: 'Space Grotesk', sans-serif; }
  </style>
</head>
<body class="bg-[#F5F5F5] text-[#0F172A] p-0 md:p-1 min-h-screen flex flex-col items-center">
  <div class="w-full max-w-[1280px] bg-white shadow-2xl overflow-hidden flex flex-col min-h-screen">
    <!-- Navbar -->
    <nav class="w-full h-20 px-4 md:px-12 flex items-center justify-between bg-white sticky top-0 z-50 border-b border-gray-50">
      <div class="text-2xl font-bold font-space tracking-tighter">CELLPOINT</div>
      <div class="hidden md:flex items-center gap-10 text-base font-medium font-space text-[#475569]">
        <a href="index.html" class="hover:text-[#4263B2] transition-colors">Inicio</a>
        <a href="catalogo.html" class="hover:text-[#4263B2] transition-colors">Catálogo</a>
        <a href="novedades.html" class="hover:text-[#4263B2] transition-colors">Novedades</a>
        <a href="soporte.html" class="hover:text-[#4263B2] transition-colors">Soporte</a>
      </div>
      <div class="flex items-center gap-6">
        <a href="carrito.html" aria-label="Carrito" class="relative text-[#4263B2] transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" /><path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" />
          </svg>
          <span id="cart-count" class="absolute -top-2 -right-2 bg-[#4263B2] text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
        </a>
      </div>
    </nav>

    <main class="w-full flex-grow p-8 md:p-12 bg-[#F5F5F5]">
      <div class="max-w-4xl mx-auto bg-white p-8 rounded-sm shadow-sm">
        <h1 class="text-3xl font-bold font-space mb-8 border-b pb-4">Tu Carrito de Compras</h1>
        
        <!-- Contenedor de la lista -->
        <div id="lista-carrito" class="space-y-4 mb-8">
          <!-- Los productos se cargarán aquí dinámicamente -->
          <p class="text-gray-500 italic">Cargando productos...</p>
        </div>

        <!-- Resumen -->
        <div class="border-t pt-6 flex flex-col md:flex-row justify-between items-center gap-6">
          <div class="text-left">
            <p class="text-gray-500 uppercase text-xs font-bold tracking-widest">Total a pagar</p>
            <h2 id="total-carrito" class="text-3xl font-bold text-[#4263B2]">0 GS.</h2>
          </div>
          <div class="flex gap-4 w-full md:w-auto">
            <button id="vaciar-carrito" class="px-6 py-3 border border-gray-200 text-gray-500 text-xs font-bold uppercase tracking-widest hover:bg-gray-50 transition-all rounded-sm">
              Vaciar Carrito
            </button>
            <button id="finalizar-compra" class="flex-grow md:flex-none px-10 py-3 bg-[#0f172a] text-white text-xs font-bold uppercase tracking-widest hover:bg-black transition-all rounded-sm">
              Finalizar Compra
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="w-full px-4 md:px-10 py-10 flex items-center justify-between text-gray-400 text-sm font-space border-t border-gray-100 bg-white">
      <p class="font-medium text-[13px]">© 2026 . Todos los derechos reservados.</p>
      <div class="flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="opacity-40">
          <circle cx="10" cy="10" r="8"/><path d="M10 2a14.5 14.5 0 0 0 0 16"/><path d="M2 10h16"/>
        </svg>
      </div>
    </footer>
  </div>
</body>
</html>
