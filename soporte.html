<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soporte - CELLPOINT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .font-space {
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
</head>

<body class="bg-[#F5F5F5] text-[#0F172A] p-0 md:p-1 min-h-screen flex flex-col items-center">

  <!-- Contenedor Principal (Boxed Layout) -->
  <div class="w-full max-w-[1280px] bg-white shadow-2xl overflow-hidden flex flex-col">

    <!-- Navbar -->
    <nav
      class="w-full h-16 px-2 md:px-4 flex items-center justify-between bg-white sticky top-0 z-50 border-b border-gray-50">
      <div class="text-2xl font-bold font-space tracking-tighter text-black">CELLPOINT</div>

      <div class="hidden md:flex items-center gap-10 text-base font-medium font-space text-[#475569]">
        <a href="index.html" class="hover:text-[#4263B2] transition-colors">Inicio</a>
        <a href="catalogo.html" class="hover:text-[#4263B2] transition-colors">Catálogo</a>
        <a href="novedades.html" class="hover:text-[#4263B2] transition-colors">Novedades</a>
        <a href="soporte.html" class="text-[#4263B2] border-b-2 border-[#4263B2] pb-1">Soporte</a>
      </div>

      <div class="flex items-center gap-4">
        <button aria-label="Carrito" class="hover:text-[#4263B2] transition-colors mr-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
            <path d="M3 6h18" />
            <path d="M16 10a4 4 0 0 1-8 0" />
          </svg>
        </button>
      </div>
    </nav>

    <main class="w-full">
      <!-- Hero Section Soporte -->
      <section class="relative h-[480px] bg-[#0f172a] flex items-center justify-center overflow-hidden">
        <!-- Imagen de fondo sutil (utilizando una existente con overlay) -->
        <img src="img/pic3.png" class="absolute inset-0 w-full h-full object-cover opacity-20 grayscale" alt="">
        <div class="relative z-10 flex flex-col items-center opacity-40">
          <div class="text-[120px] font-bold font-space text-white tracking-[0.2em] select-none">SS</div>
          <div class="text-4xl font-bold font-space text-white tracking-[0.5em] mt-[-40px] uppercase">Support</div>
        </div>
        <!-- Gear Icon floating -->
        <div class="absolute right-[15%] top-1/2 -translate-y-1/2 opacity-20">
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="140" viewBox="0 0 24 24" fill="none"
            stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </div>
      </section>

      <!-- Contenido Principal -->
      <section class="relative p-8 md:p-12 bg-[#F5F5F5] min-h-[500px]">
        <!-- Tarjeta Live Chat Superpuesta -->
        <div
          class="absolute -top-32 left-8 md:left-12 bg-white p-10 rounded-sm shadow-xl w-full max-w-[320px] z-10 space-y-6">
          <div class="w-12 h-12 bg-[#EFF6FF] rounded-lg flex items-center justify-center text-[#4263B2]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
              <path d="M8 9h8" />
              <path d="M8 13h6" />
            </svg>
          </div>
          <h3 class="text-xl font-bold font-space">Live Chat</h3>
          <p class="text-sm text-gray-500 leading-relaxed">
            Habla con un experto técnico en tiempo real las<br>24 horas.
          </p>
          <a href="#" class="text-[#4263B2] text-sm font-bold flex items-center gap-2 hover:underline">
            Chatear ahora <span class="text-lg">→</span>
          </a>
        </div>

        <!-- Grid de opciones secundarias -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-40">
          <!-- Tarjeta Mi Dispositivo -->
          <div class="bg-[#EFF3F6] p-10 rounded-sm space-y-6 flex flex-col justify-center">
            <span
              class="inline-block bg-[#A5C3FF] text-white text-[9px] font-bold px-3 py-1 rounded-full uppercase tracking-wider w-fit">MI
              DISPOSITIVO</span>
            <h4 class="text-xl font-bold">Galaxy S24 Ultra</h4>
            <div class="flex items-center gap-6 text-[11px] font-medium text-gray-500 uppercase tracking-tight">
              <div class="flex items-center gap-2"><img src="img/icono1.png" class="w-4 h-4 object-contain" alt="">
                Garantía Activa</div>
              <div class="flex items-center gap-2"><img src="img/icono2.png" class="w-4 h-4 object-contain" alt="">
                Software actualizado</div>
            </div>
            <div class="flex gap-0 pt-2">
              <button
                class="bg-[#003A70] text-white text-xs font-bold px-8 py-4 rounded-l-sm hover:bg-[#002b52] transition-colors w-1/2">Pedir
                reparación</button>
              <button
                class="bg-transparent text-gray-700 border border-gray-300 text-xs font-bold px-8 py-4 rounded-r-sm hover:bg-gray-50 transition-colors w-1/2">Ver
                manual detallado</button>
            </div>
          </div>

          <!-- Tarjeta Samsung Care+ -->
          <div class="relative rounded-sm overflow-hidden h-[320px] group shadow-sm">
            <img src="img/Featured Support Content.png"
              class="absolute inset-0 w-full h-full object-cover grayscale opacity-30" alt="">
            <div class="absolute inset-0 bg-gradient-to-br from-[#1e293b]/90 to-[#0f172a]/95"></div>
            <img src="img/Featured Support Content.png"
              class="absolute inset-0 w-full h-full object-cover opacity-40 pointer-events-none group-hover:scale-110 transition-transform duration-1000"
              alt="">

            <div class="relative z-10 h-full p-10 flex flex-col justify-end space-y-4">

              <button
                class="bg-white text-black text-xs font-bold px-6 py-3 rounded-sm w-fit hover:bg-gray-100 transition-colors uppercase tracking-widest">Saber
                más</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer
      class="w-full px-4 md:px-10 py-10 flex items-center justify-between text-gray-400 text-sm font-space border-t border-gray-100 bg-white">
      <p class="font-medium text-[13px]">© 2026 . Todos los derechos reservados.</p>
      <div class="flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor"
          stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="opacity-40">
          <circle cx="10" cy="10" r="8" />
          <path d="M10 2a14.5 14.5 0 0 0 0 16" />
          <path d="M2 10h16" />
        </svg>
      </div>
    </footer>
  </div>
</body>

</html>
